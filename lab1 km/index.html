<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Траєкторія руху</title>
  <style>
    canvas {
      border: 1px solid black;
      background: #f9f9f9;
    }
    .controls {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<canvas id="canvas" width="600" height="400"></canvas>

<div class="controls">
  x0: <input type="number" id="x0" value="0">
  y0: <input type="number" id="y0" value="0"><br><br>

  Кут (градуси): <input type="number" id="angle" value="45"><br><br>
  Швидкість: <input type="number" id="v0" value="50"><br><br>
  Прискорення: <input type="number" id="a" value="-9.8"><br><br>

  Колір: <input type="color" id="color" value="#ff0000"><br><br>

  <button onclick="draw()">Побудувати</button>
  <button onclick="clearCanvas()">Очистити</button>
</div>

<script src="script.js"></script>
</body>
</html>
