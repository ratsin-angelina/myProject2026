<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>D3 Траєкторія</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    svg {
      border: 1px solid black;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

<svg width="600" height="400"></svg>

<div>
  x0: <input type="number" id="x0" value="0">
  y0: <input type="number" id="y0" value="0"><br><br>

  Кут: <input type="number" id="angle" value="45"><br><br>
  Швидкість: <input type="number" id="v0" value="50"><br><br>
  Прискорення: <input type="number" id="a" value="-9.8"><br><br>

  Колір: <input type="color" id="color" value="#ff0000"><br><br>

  <button onclick="draw()">Побудувати</button>
  <button onclick="clearGraph()">Очистити</button>
</div>

<script src="script.js"></script>
</body>
</html>
